services:
  - type: web
    name: django-mini-blog
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn blog.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: True
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: django_mini_blog_db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: mini-blog1-diyd.onrender.com 